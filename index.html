<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paint Launch</title>
    <link rel="stylesheet" href="styles.css"/>
</head>
<body>
    <canvas id="canvas1"></canvas>
    <!-- PLAYER SPRITES -->
    <img id="playerBase" src="images/paintboy/player-base.png">
    <img id="playerBlue" src="images/paintboy/player-blue.png">
    <img id="playerRed" src="images/paintboy/player-red.png">
    <img id="playerGold" src="images/paintboy/player-gold.png">
    <img id="playerNeon" src="images/paintboy/player-neon.png">
    <!-- ENEMY SPRITES -->
    <img id="enemyImage" src="images/enemies/enemy_1.png">
    <img id="enemy2Image" src="images/enemies/enemy_2.png">
    <img id="enemy3Image" src="images/enemies/enemy_2.png">
    <!-- CANNONS -->
    <img id="baseCannon" src="images/cannons/base-c.png">
    <img id="baseBarrel" src="images/cannons/base-b.png">
    <img id="blueCannon" src="images/cannons/blue-c.png">
    <img id="blueBarrel" src="images/cannons/blue-b.png">
    <img id="redCannon" src="images/cannons/red-c.png">
    <img id="redBarrel" src="images/cannons/red-b.png">
    <img id="goldCannon" src="images/cannons/gold-c.png">
    <img id="goldBarrel" src="images/cannons/gold-b.png">
    <img id="neonCannon" src="images/cannons/neon-c.png">
    <img id="neonBarrel" src="images/cannons/neon-b.png">
    <!-- BACKGROUND -->
    <img id="backgroundImage1" src="images/background/bg1.png">
    <img id="backgroundImage2" src="images/background/bg2.png">
    <img id="backgroundImage3" src="images/background/bg3.png">
    <img id="backgroundImage4" src="images/background/bg4.png">
    <img id="backgroundImage5" src="images/background/bg5.png">
    <img id="backgroundImage6" src="images/background/bg6.png">

    <script src="script.js"></script>
</body>
</html>
